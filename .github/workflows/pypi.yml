name: Publish PyPI Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'mip-client-python/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: ./mip-client-python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            ## Installation
            ```bash
            pip install mip-client-python
            ```

            📦 [View on PyPI](https://pypi.org/project/mip-client-python/)
          files: |
            mip-client-python/dist/*.whl
            mip-client-python/dist/*.tar.gz
            mip-client-python/LICENSE
            mip-client-python/README.md

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mip-client-python/dist/
          skip-existing: true
