name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mip-client-ts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ts-dist
          path: |
            mip-client-ts/dist/
            mip-client-ts/LICENSE
            mip-client-ts/README.md

  build-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mip-client-python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            mip-client-python/dist/
            mip-client-python/LICENSE
            mip-client-python/README.md

  build-rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mip-client-rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build package
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Package source
        run: cargo package --allow-dirty

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-dist
          path: |
            mip-client-rust/target/package/*.crate
            mip-client-rust/LICENSE
            mip-client-rust/README.md

  release:
    needs: [build-ts, build-python, build-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download TypeScript artifacts
        uses: actions/download-artifact@v4
        with:
          name: ts-dist
          path: ts-dist

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: python-dist

      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-dist
          path: rust-dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            ## TypeScript Client
            ```bash
            npm install @mip-client/ts
            ```
            📦 [View on NPM](https://www.npmjs.com/package/@mip-client/ts)

            ## Python Client
            ```bash
            pip install mip-client-python
            ```
            📦 [View on PyPI](https://pypi.org/project/mip-client-python/)

            ## Rust Client
            ```bash
            cargo add mip-client
            ```
            📦 [View on crates.io](https://crates.io/crates/mip-client)
          files: |
            ts-dist/mip-client-ts/dist/*.js
            ts-dist/mip-client-ts/dist/*.d.ts
            ts-dist/mip-client-ts/LICENSE
            ts-dist/mip-client-ts/README.md
            python-dist/mip-client-python/dist/*.whl
            python-dist/mip-client-python/dist/*.tar.gz
            python-dist/mip-client-python/LICENSE
            python-dist/mip-client-python/README.md
            rust-dist/mip-client-rust/target/package/*.crate
            rust-dist/mip-client-rust/LICENSE
            rust-dist/mip-client-rust/README.md

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    defaults:
      run:
        working-directory: ./mip-client-ts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
        continue-on-error: true

  publish-pypi:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: ./mip-client-python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mip-client-python/dist/
          skip-existing: true

  publish-crates:
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mip-client-rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CRATES_IO_TOKEN }}
          path: ./mip-client-rust
          ignore-unpublished-changes: true
